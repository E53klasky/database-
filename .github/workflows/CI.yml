name: CIS4301 Project CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cis4301sp26_project

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: rootpassword
          MARIADB_DATABASE: tpcds_rental
          MARIADB_USER: testuser
          MARIADB_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MariaDB Connector/C system library
        run: sudo apt-get install -y libmariadb-dev

      - name: Install Python dependencies
        run: pip install mariadb

      - name: Enable local_infile in MariaDB
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -prootpassword \
            -e "SET GLOBAL local_infile = 1;"

      - name: Write MARIADB_CREDS.py
        run: |
          cat > MARIADB_CREDS.py << 'CREDS'
          DB_CONFIG = {
              "username": "testuser",
              "password": "testpassword",
              "port": 3306,
              "host": "127.0.0.1",
              "database": "tpcds_rental",
          }
          CREDS

      - name: Generate small test CSVs for CI
        run: python generate_test_data.py

      - name: Set up database and load TPC-DS data
        run: python setup_db.py ./tpcds_data/

      - name: Run public tests
        run: python public_tests.py
